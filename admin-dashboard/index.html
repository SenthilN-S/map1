<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <title>CrowdSafe Admin</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js" defer></script>

    <script src="/config.js" defer></script>
    <script src="/admin.js" defer></script>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="card" style="display:flex; gap:12px; align-items:center; flex:1">
          <div style="min-width:140px">
            <div style="font-weight:700">Authority Panel</div>
            <div class="status" style="font-size:11px">Live Monitoring</div>
          </div>
          <div class="search" style="flex:1; margin:0">
            <input id="searchInput" type="search" placeholder="Search places (temple, bus stand, stadium…)" />
          </div>
        </div>
        <button class="btn primary" id="historyBtn">📋 History</button>
        <button class="btn" id="fitBtn">Fit to activity</button>
      </div>

      <div id="map"></div>

      <div class="panel">
        <div class="card status">
          <div>Active devices: <strong id="devicesText">0</strong></div>
          <div>Red cells: <strong id="redText">0</strong></div>
          <div>Incidents: <strong id="incText">0</strong></div>
          <button class="btn" id="clearIncBtn" style="margin-top:8px; font-size:12px; padding:5px 10px">Clear Incidents</button>
        </div>
        <div class="card status" style="min-width:280px">
          <div style="font-weight:700; margin-bottom:6px">Thresholds (per 10m×10m cell)</div>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <label style="display:flex; gap:8px; align-items:center">
              <span style="width:70px">Yellow</span>
              <input id="yellowInput" type="number" min="1" max="500" step="1" value="3" style="width:90px; padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.15); color:inherit" />
            </label>
            <label style="display:flex; gap:8px; align-items:center">
              <span style="width:70px">Red</span>
              <input id="redInput" type="number" min="1" max="500" step="1" value="6" style="width:90px; padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.15); color:inherit" />
            </label>
            <label style="display:flex; gap:8px; align-items:center">
              <span style="width:70px">Cell Size</span>
              <input id="cellInput" type="number" min="5" max="200" step="1" value="10" style="width:90px; padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.15); color:inherit" />
            </label>
            <button class="btn primary" id="applyBtn">Apply</button>
          </div>
          <div class="status" style="margin-top:6px">Current: <strong id="cfgText">loading…</strong></div>
        </div>
        <div class="card legend">
          <span><span class="dot safe"></span>Low</span>
          <span><span class="dot warn"></span>Moderate</span>
          <span><span class="dot danger"></span>Overcrowded</span>
        </div>
      </div>

      <!-- Pending Events Panel -->
      <div class="events-panel card">
        <div style="font-weight:700; margin-bottom:10px">Pending Event Requests</div>
        <div id="eventsList" class="events-list">
          <div style="opacity:0.5; font-size:13px">Loading...</div>
        </div>
      </div>

      <!-- SOS Alerts -->
      <div id="sosContainer" class="sos-container"></div>

      <!-- History Drawer -->
      <div class="history-overlay" id="historyOverlay"></div>
      <div class="history-drawer" id="historyDrawer">
        <div class="history-header">
          <h2>📋 Activity History</h2>
          <button class="btn" id="closeHistoryBtn">✕ Close</button>
        </div>
        <div class="history-tabs">
          <button class="history-tab active" id="tabEvents" onclick="switchTab('events')">🗓 Event Requests</button>
          <button class="history-tab" id="tabSos" onclick="switchTab('sos')">🚨 SOS Alerts</button>
        </div>
        <div id="historyEvents" class="history-content"></div>
        <div id="historySos" class="history-content" style="display:none"></div>
      </div>
    </div>
  </body>
</html>
